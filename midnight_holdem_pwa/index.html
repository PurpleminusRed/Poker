    /* =========================
       Deck and card helpers
    ========================= */

    function createDeck() {
      const deck = [];
      for (const suit of SUITS) {
        for (const rank of RANKS) {
          deck.push({
            id: `c${++state.cardSerial}`,
            suit: suit.key,
            symbol: suit.symbol,
            color: suit.color,
            value: rank.value,
            label: rank.label
          });
        }
      }
      return shuffle(deck);
    }

    function shuffle(cards) {
      const copy = cards.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function drawCard() {
      return state.deck.pop();
    }

    function cardText(card) {
      return `${card.label}${card.symbol}`;
    }

    function money(amount) {
      return Math.max(0, Math.floor(amount)).toLocaleString("en-US");
    }

    function possessive(name) {
      return name === "You" ? "your" : `${name}'s`;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function markCardForFlip(cardId) {
      state.flippingCardIds.add(cardId);
    }

    function consumeCardFlip(cardId) {
      const shouldFlip = state.flippingCardIds.has(cardId);
      if (shouldFlip) state.flippingCardIds.delete(cardId);
      return shouldFlip;
    }

    function cardKey(card) {
      return `${card.value}-${card.suit}`;
    }

    function freshDeck() {
      const deck = [];
      for (const suit of SUITS) {
        for (const rank of RANKS) {
          deck.push({
            id: `${rank.value}-${suit.key}`,
            suit: suit.key,
            symbol: suit.symbol,
            color: suit.color,
            value: rank.value,
            label: rank.label
          });
        }
      }
      return deck;
    }

    /* =========================
       Hand evaluator
    ========================= */

    function evaluateBestHand(cards) {
      const combos = combinations(cards, 5);
      let best = null;
      for (const combo of combos) {
        const evaluated = evaluateFiveCards(combo);
        if (!best || compareHands(evaluated, best) > 0) {
          best = evaluated;
        }
      }
      return best;
    }

    function combinations(items, size) {
      const result = [];
      function walk(start, combo) {
        if (combo.length === size) {
          result.push(combo.slice());
          return;
        }
        for (let i = start; i <= items.length - (size - combo.length); i++) {
          combo.push(items[i]);
          walk(i + 1, combo);
          combo.pop();
        }
      }
      walk(0, []);
      return result;
    }

    function evaluateFiveCards(cards) {
      const ranks = cards.map(card => card.value).sort((a, b) => b - a);
      const counts = new Map();
      for (const rank of ranks) counts.set(rank, (counts.get(rank) || 0) + 1);

      const countGroups = Array.from(counts.entries())
        .map(([rank, count]) => ({ rank, count }))
        .sort((a, b) => b.count - a.count || b.rank - a.rank);

      const isFlush = cards.every(card => card.suit === cards[0].suit);
      const straightHigh = getStraightHigh(ranks);

      if (isFlush && straightHigh) {
        if (straightHigh === 14) {
          return handResult(9, [14], cards);
        }
        return handResult(8, [straightHigh], cards);
      }

      if (countGroups[0].count === 4) {
        const quad = countGroups[0].rank;
        const kicker = countGroups.find(group => group.rank !== quad).rank;
        return handResult(7, [quad, kicker], cards);
      }

      if (countGroups[0].count === 3 && countGroups[1].count === 2) {
        return handResult(6, [countGroups[0].rank, countGroups[1].rank], cards);
      }

      if (isFlush) {
        return handResult(5, ranks, cards);
      }

      if (straightHigh) {
        return handResult(4, [straightHigh], cards);
      }

      if (countGroups[0].count === 3) {
        const trip = countGroups[0].rank;
        const kickers = ranks.filter(rank => rank !== trip);
        return handResult(3, [trip, ...kickers], cards);
      }

      if (countGroups[0].count === 2 && countGroups[1].count === 2) {
        const pairs = countGroups.filter(group => group.count === 2).map(group => group.rank).sort((a, b) => b - a);
        const kicker = ranks.find(rank => !pairs.includes(rank));
        return handResult(2, [pairs[0], pairs[1], kicker], cards);
      }

      if (countGroups[0].count === 2) {
        const pair = countGroups[0].rank;
        const kickers = ranks.filter(rank => rank !== pair);
        return handResult(1, [pair, ...kickers], cards);
      }

      return handResult(0, ranks, cards);
    }

    function handResult(rank, tiebreakers, cards) {
      return {
        rank,
        name: HAND_NAMES[rank],
        tiebreakers,
        cards: cards.slice()
      };
    }

    function getStraightHigh(ranks) {
      const unique = Array.from(new Set(ranks)).sort((a, b) => b - a);
      if (unique.includes(14) && unique.includes(5) && unique.includes(4) && unique.includes(3) && unique.includes(2)) {
        return 5;
      }
      if (unique.length !== 5) return 0;
      return unique[0] - unique[4] === 4 ? unique[0] : 0;
    }

    function compareHands(a, b) {
      if (a.rank !== b.rank) return a.rank - b.rank;
      const max = Math.max(a.tiebreakers.length, b.tiebreakers.length);
      for (let i = 0; i < max; i++) {
        const left = a.tiebreakers[i] || 0;
        const right = b.tiebreakers[i] || 0;
        if (left !== right) return left - right;
      }
      return 0;
    }

    function handDescription(result) {
      return result ? result.name.toLowerCase() : "a mystery";
    }

    /* =========================
       AI logic
    ========================= */

    function decideAIAction(player) {
      const cfg = DIFFICULTY[state.difficulty] || DIFFICULTY.normal;
      const callAmount = amountToCall(player);
      const potAfterCall = state.pot + callAmount;
      const potOdds = callAmount > 0 ? callAmount / Math.max(1, potAfterCall) : 0;
      const strength = estimateStrength(player);
      const texture = boardTextureScore();
      const position = positionScore(player);
      const pressureBonus = state.passiveMeter > 2 ? 0.05 : 0;
      const adjustedStrength = clamp(
        strength + position * 0.04 - texture * 0.04 + cfg.looseness + pressureBonus,
        0,
        1
      );
      const raiseStrength = clamp(
        strength + position * 0.04 - texture * 0.04 + Math.max(0, cfg.looseness * 0.35) + pressureBonus,
        0,
        1
      );

      if (Math.random() < cfg.mistake) {
        return mistakeAction(player, callAmount);
      }

      const maxTarget = player.roundBet + player.chips;
      const minTarget = minimumRaiseTarget();
      const canRaise = maxTarget > state.currentBet && maxTarget >= Math.min(minTarget, state.currentBet + 1);
      const isPreflop = state.phase === "preflop";
      const facingPreflopRaise = isPreflop && state.currentBet > BIG_BLIND;
      let valueRaiseLine = state.difficulty === "brutal" ? 0.69 : state.difficulty === "hard" ? 0.66 : 0.72;
      let bluffChance = cfg.bluff * (callAmount === 0 ? 1.1 : 0.65) * (1 + position * 0.35);

      if (isPreflop) {
        valueRaiseLine = state.difficulty === "brutal" ? 0.80 : state.difficulty === "hard" ? 0.83 : state.difficulty === "normal" ? 0.88 : 0.98;
        if (facingPreflopRaise) valueRaiseLine += 0.06 + state.preflopRaiseCount * 0.04;
        if (state.preflopRaiseCount >= 2) valueRaiseLine += 0.08;
        bluffChance *= facingPreflopRaise ? 0.10 : 0.25;
      }

      const deceptiveTrap = state.difficulty === "brutal" && raiseStrength > 0.78 && Math.random() < cfg.deception;

      if (callAmount > 0) {
        const callThreshold = potOdds + (state.difficulty === "easy" ? -0.10 : state.difficulty === "brutal" ? 0.12 : 0.05);
        if (adjustedStrength < callThreshold && Math.random() > bluffChance) {
          return { type: "fold" };
        }
        if (canRaise && !deceptiveTrap && (raiseStrength > valueRaiseLine || Math.random() < bluffChance)) {
          return { type: "raise", amount: chooseRaiseTarget(player, raiseStrength, cfg.aggression) };
        }
        return { type: "call" };
      }

      if (canRaise && !deceptiveTrap && (raiseStrength > valueRaiseLine - (isPreflop ? 0.03 : 0.08) || Math.random() < bluffChance)) {
        return { type: "raise", amount: chooseRaiseTarget(player, raiseStrength, cfg.aggression) };
      }
      return { type: "check" };
    }

    function mistakeAction(player, callAmount) {
      const preflop = state.phase === "preflop";
      if (callAmount > 0) {
        if (Math.random() < (preflop ? 0.84 : 0.72) && callAmount < player.chips) return { type: "call" };
        if (Math.random() < (preflop ? 0.04 : 0.18)) return { type: "raise", amount: chooseRaiseTarget(player, 0.52, 0.35) };
        return { type: "fold" };
      }
      if (Math.random() < (preflop ? 0.08 : 0.28)) return { type: "raise", amount: chooseRaiseTarget(player, 0.48, 0.30) };
      return { type: "check" };
    }

    function chooseRaiseTarget(player, strength, aggression) {
      if (state.phase === "preflop") {
        return choosePreflopRaiseTarget(player, strength, aggression);
      }

      const minTarget = minimumRaiseTarget();
      const maxTarget = player.roundBet + player.chips;
      if (maxTarget <= state.currentBet) return maxTarget;

      const potSized = state.currentBet + Math.max(BIG_BLIND, Math.round((state.pot * (0.38 + aggression * 0.34)) / 10) * 10);
      const valueSized = state.currentBet + Math.round((BIG_BLIND * (1.3 + strength * 3.0 + aggression)) / 10) * 10;
      const desired = Math.max(minTarget, Math.min(potSized, valueSized));
      const target = clamp(desired, Math.min(minTarget, maxTarget), maxTarget);

      if (strength > 0.88 && Math.random() < aggression * 0.20) {
        return maxTarget;
      }
      return Math.round(target / 10) * 10;
    }

    function choosePreflopRaiseTarget(player, strength, aggression) {
      const minTarget = minimumRaiseTarget();
      const maxTarget = player.roundBet + player.chips;
      if (maxTarget <= state.currentBet) return maxTarget;

      let desired;
      if (state.currentBet <= BIG_BLIND) {
        const liveCount = playersInHand().filter(p => !p.folded).length;
        const openBigBlinds = 2.15 + aggression * 0.42 + (strength > 0.86 ? 0.25 : 0) + Math.min(0.25, Math.max(0, liveCount - 3) * 0.05);
        desired = BIG_BLIND * openBigBlinds;
      } else {
        const heat = state.preflopRaiseCount;
        const multiplier = heat >= 2 ? 1.38 : 1.65 + aggression * 0.18 + (strength > 0.91 ? 0.16 : 0);
        const capOverCurrent = BIG_BLIND * (heat >= 2 ? 3.5 : 5.25);
        desired = Math.min(state.currentBet * multiplier, state.currentBet + capOverCurrent);
      }

      const target = clamp(Math.round(Math.max(minTarget, desired) / 10) * 10, Math.min(minTarget, maxTarget), maxTarget);
      return target;
    }

    function estimateStrength(player) {
      const boardCards = revealedBoardCards();
      if (boardCards.length >= 3) {
        const made = evaluateBestHand(player.hole.concat(boardCards));
        const madeScore = made.rank / 9;
        const kickerScore = (made.tiebreakers[0] || 2) / 14 * 0.12;
        const drawScore = drawPotential(player.hole.concat(boardCards));
        return clamp(madeScore * 0.78 + kickerScore + drawScore, 0.03, 0.98);
      }
      return preflopStrength(player.hole);
    }

    function preflopStrength(hole) {
      const [a, b] = hole.slice().sort((x, y) => y.value - x.value);
      const pair = a.value === b.value;
      const suited = a.suit === b.suit;
      const gap = Math.abs(a.value - b.value);
      let score = 0.18 + ((a.value - 2) / 12) * 0.32 + ((b.value - 2) / 12) * 0.18;
      if (pair) score += 0.18 + a.value / 100;
      if (suited) score += 0.05;
      if (gap === 1) score += 0.05;
      if (gap === 2) score += 0.025;
      if (gap > 4) score -= 0.07;
      if (a.value >= 13 && b.value >= 10) score += 0.08;
      if (a.value === 14) score += 0.04;
      return clamp(score, 0.05, 0.96);
    }

    function drawPotential(cards) {
      const suits = countBy(cards, card => card.suit);
      const ranks = Array.from(new Set(cards.map(card => card.value)));
      if (ranks.includes(14)) ranks.push(1);
      let score = 0;
      if (Math.max(...Object.values(suits)) >= 4) score += 0.10;
      for (let start = 1; start <= 10; start++) {
        const inWindow = [start, start + 1, start + 2, start + 3, start + 4].filter(rank => ranks.includes(rank)).length;
        if (inWindow >= 4) score += 0.08;
      }
      return clamp(score, 0, 0.18);
    }

    function boardTextureScore() {
      const board = revealedBoardCards();
      if (board.length < 3) return 0;
      const suits = countBy(board, card => card.suit);
      const ranks = countBy(board, card => card.value);
      const suitPressure = Math.max(...Object.values(suits)) >= 3 ? 0.22 : 0;
      const paired = Object.values(ranks).some(count => count > 1) ? 0.16 : 0;
      const values = Array.from(new Set(board.map(card => card.value))).sort((a, b) => a - b);
      const connected = values.some((value, index) => values[index + 2] !== undefined && values[index + 2] - value <= 4) ? 0.16 : 0;
      return suitPressure + paired + connected;
    }

    function positionScore(player) {
      const active = playersInHand().filter(p => !p.folded);
      if (active.length <= 2) return 0.5;
      const dealer = state.dealerIndex;
      const distance = (player.index - dealer + state.players.length) % state.players.length;
      return distance / Math.max(1, state.players.length - 1);
    }

    function countBy(items, getter) {
      return items.reduce((acc, item) => {
        const key = getter(item);
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    /* =========================
       Game flow
    ========================= */

    function createPlayers(aiCount) {
      const aiNames = shuffle(AI_NAMES).slice(0, aiCount);
      const players = [{ name: "You", isHuman: true }]
        .concat(aiNames.map(name => ({ name, isHuman: false })));

      return players.map((player, index) => ({
        id: `p${index}`,
        index,
        name: player.name,
        isHuman: player.isHuman,
        chips: STARTING_STACK,
        hole: [],
        folded: false,
        allIn: false,
        busted: false,
        acted: false,
        roundBet: 0,
        totalBet: 0,
        lastAction: "",
        hand: null
      }));
    }

    function startGame() {
      state.difficulty = els.titleDifficulty.value;
      state.aiCount = Number(els.titleOpponents.value);
      audio.musicEnabled = els.titleMusic.checked;
      audio.sfxEnabled = els.titleSfx.checked;
      syncSettingsControls();
      unlockAudio();

      state.players = createPlayers(state.aiCount);
      state.dealerIndex = state.players.length - 1;
      state.handNumber = 0;
      state.passiveMeter = 0;
      state.log = [];
      state.lastWinners = [];
      state.showdownText = "";
      state.equityCacheKey = "";
      state.equityCache = null;
      els.titleScreen.classList.add("hidden");
      els.gameScreen.classList.remove("hidden");
      startNewHand();
    }

    async function startNewHand() {
      if (state.busy) return;
      state.busy = true;
      state.awaitingHuman = false;
      state.thinkingId = null;
      state.handOver = false;
      state.revealAll = false;
      state.lastWinners = [];
      state.showdownText = "";
      state.equityCacheKey = "";
      state.equityCache = null;
      state.board = [];
      state.deck = createDeck();
      state.pot = 0;
      state.currentBet = 0;
      state.minRaise = BIG_BLIND;
      state.preflopRaiseCount = 0;
      state.flippingCardIds.clear();
      state.phase = "setup";

      for (const player of state.players) {
        player.hole = [];
        player.folded = false;
        player.allIn = false;
        player.acted = false;
        player.roundBet = 0;
        player.totalBet = 0;
        player.lastAction = "";
        player.hand = null;
        player.busted = player.chips <= 0;
      }

      const livePlayers = state.players.filter(player => player.chips > 0);
      if (livePlayers.length < 2) {
        state.handOver = true;
        state.phase = "complete";
        const winner = livePlayers[0];
        logLine(winner && winner.isHuman ? "You own the room. Start a new game to play again." : "The table has gone quiet. Start a new game to play again.");
        state.busy = false;
        render();
        return;
      }

      state.dealerIndex = nextLiveIndex(state.dealerIndex);
      const blindInfo = blindIndexes();
      state.smallBlindIndex = blindInfo.small;
      state.bigBlindIndex = blindInfo.big;
      state.handNumber += 1;

      logLine(`Hand ${state.handNumber}. The button rests with ${state.players[state.dealerIndex].name}.`);
      postBlind(state.players[state.smallBlindIndex], SMALL_BLIND, "small blind");
      postBlind(state.players[state.bigBlindIndex], BIG_BLIND, "big blind");
      state.currentBet = Math.max(...state.players.map(player => player.roundBet));

      render();
      await sleep(360);
      await dealHoleCards();
      beginBettingRound("preflop", nextLiveIndex(state.bigBlindIndex));
      state.busy = false;
      continueGame();
    }

    function blindIndexes() {
      const live = state.players.filter(player => player.chips > 0);
      if (live.length === 2) {
        return {
          small: state.dealerIndex,
          big: nextLiveIndex(state.dealerIndex)
        };
      }
      const small = nextLiveIndex(state.dealerIndex);
      return {
        small,
        big: nextLiveIndex(small)
      };
    }

    function postBlind(player, blindAmount, label) {
      const amount = Math.min(blindAmount, player.chips);
      commitChips(player, amount);
      player.lastAction = `${label} ${money(amount)}`;
      if (player.chips === 0) player.allIn = true;
      logAction(player, `posts the ${label} for ${money(amount)}`);
    }

    async function dealHoleCards() {
      const livePlayers = state.players.filter(player => player.chips > 0);
      for (let cardNo = 0; cardNo < 2; cardNo++) {
        for (const player of livePlayers) {
          const card = drawCard();
          await animateCardToSeat(player.id);
          playSfx("deal");
          player.hole.push(card);
          if (player.isHuman) markCardForFlip(card.id);
          render();
          await sleep(75);
        }
      }
      logLine("Two cards slide through the amber light.");
    }

    function beginBettingRound(phase, firstIndex) {
      state.phase = phase;
      state.awaitingHuman = false;
      state.thinkingId = null;
      for (const player of state.players) {
        if (!player.folded && !player.busted && !player.allIn) {
          player.acted = false;
        }
      }
      if (phase !== "preflop") {
        state.currentBet = 0;
        state.minRaise = BIG_BLIND;
        for (const player of state.players) player.roundBet = 0;
      }
      state.currentActorIndex = firstPendingIndex(firstIndex);
      render();
    }

    async function continueGame() {
      if (state.busy || state.handOver) {
        render();
        return;
      }

      if (singlePlayerRemaining()) {
        await awardFoldPot();
        return;
      }

      if (shouldRunBoardToShowdown()) {
        state.busy = true;
        await revealRemainingBoard();
        await showdown();
        state.busy = false;
        render();
        return;
      }

      if (bettingRoundComplete()) {
        state.busy = true;
        await advanceStreet();
        state.busy = false;
        continueGame();
        return;
      }

      const next = firstPendingIndex(state.currentActorIndex);
      state.currentActorIndex = next;
      const actor = state.players[next];
      render();

      if (!actor || actor.isHuman) {
        state.awaitingHuman = true;
        render();
        return;
      }

      state.awaitingHuman = false;
      await actForAI(actor);
    }

    async function actForAI(player) {
      state.busy = true;
      state.thinkingId = player.id;
      render();
      await sleep(650 + Math.random() * 650);
      const action = decideAIAction(player);
      state.thinkingId = null;
      await applyAction(player, action.type, action.amount);
      state.currentActorIndex = (player.index + 1) % state.players.length;
      state.busy = false;
      await sleep(260);
      continueGame();
    }

    async function handleHumanAction(type) {
      unlockAudio();
      if (!state.awaitingHuman || state.busy || state.handOver) {
        playSfx("error");
        return;
      }
      const player = humanPlayer();
      const callAmount = amountToCall(player);
      let amount = null;

      if (type === "check" && callAmount > 0) {
        playSfx("error");
        return;
      }
      if (type === "call" && callAmount <= 0) {
        playSfx("error");
        return;
      }
      if (type === "raise") {
        amount = Number(els.raiseSlider.value);
        if (!canRaiseTo(player, amount)) {
          playSfx("error");
          return;
        }
      }

      state.awaitingHuman = false;
      state.busy = true;
      await applyAction(player, type, amount);
      if (type === "raise" || type === "allin") state.passiveMeter = Math.max(0, state.passiveMeter - 2);
      if (type === "check" || type === "call") state.passiveMeter += 1;
      state.currentActorIndex = (player.index + 1) % state.players.length;
      state.busy = false;
      await sleep(180);
      continueGame();
    }

    async function applyAction(player, type, raiseTarget = null) {
      const callAmount = amountToCall(player);
      let committed = 0;
      let actionText = "";

      if (type === "fold") {
        player.folded = true;
        player.acted = true;
        actionText = "folds";
        playSfx("button");
      } else if (type === "check") {
        if (callAmount > 0) return;
        player.acted = true;
        actionText = "checks";
        playSfx("button");
      } else if (type === "call") {
        committed = commitChips(player, Math.min(callAmount, player.chips));
        player.acted = true;
        if (player.chips === 0) player.allIn = true;
        actionText = committed < callAmount ? `calls all in for ${money(committed)}` : `calls ${money(committed)}`;
        await animateChips(player.id);
        playSfx("chip");
      } else if (type === "raise") {
        const target = clamp(Math.round(raiseTarget / 10) * 10, 0, player.roundBet + player.chips);
        const oldBet = state.currentBet;
        committed = commitChips(player, Math.max(0, target - player.roundBet));
        player.acted = true;
        if (player.chips === 0) player.allIn = true;
        if (player.roundBet > state.currentBet) {
          state.currentBet = player.roundBet;
          const raiseSize = state.currentBet - oldBet;
          if (raiseSize >= state.minRaise) state.minRaise = raiseSize;
          if (state.phase === "preflop") state.preflopRaiseCount += 1;
          reopenActionForOthers(player);
        }
        actionText = oldBet === 0 ? `bets ${money(player.roundBet)}` : `raises to ${money(player.roundBet)}`;
        if (player.allIn) actionText += " and is all in";
        await animateChips(player.id);
        playSfx("chip");
      } else if (type === "allin") {
        const oldBet = state.currentBet;
        committed = commitChips(player, player.chips);
        player.allIn = true;
        player.acted = true;
        if (player.roundBet > state.currentBet) {
          state.currentBet = player.roundBet;
          const raiseSize = state.currentBet - oldBet;
          if (raiseSize >= state.minRaise) state.minRaise = raiseSize;
          if (state.phase === "preflop") state.preflopRaiseCount += 1;
          reopenActionForOthers(player);
        }
        actionText = `moves all in for ${money(committed)}`;
        await animateChips(player.id);
        playSfx("chip");
      }

      player.lastAction = actionText;
      logAction(player, actionText);
      updatePot();
      render();
    }

    function reopenActionForOthers(raiser) {
      for (const player of state.players) {
        if (player.id !== raiser.id && canAct(player)) player.acted = false;
      }
      raiser.acted = true;
    }

    function commitChips(player, amount) {
      const committed = Math.min(Math.max(0, amount), player.chips);
      player.chips -= committed;
      player.roundBet += committed;
      player.totalBet += committed;
      if (player.chips === 0 && committed > 0) player.allIn = true;
      updatePot();
      return committed;
    }

    async function advanceStreet() {
      clearStreetBets();
      if (state.phase === "preflop") {
        logLine("The flop arrives.");
        await dealCommunityCards(3);
        beginBettingRound("flop", nextLiveIndex(state.dealerIndex));
      } else if (state.phase === "flop") {
        logLine("The turn card turns over.");
        await dealCommunityCards(1);
        beginBettingRound("turn", nextLiveIndex(state.dealerIndex));
      } else if (state.phase === "turn") {
        logLine("The river slips into place.");
        await dealCommunityCards(1);
        beginBettingRound("river", nextLiveIndex(state.dealerIndex));
      } else if (state.phase === "river") {
        await showdown();
      }
    }

    async function dealCommunityCards(count) {
      for (let i = 0; i < count; i++) {
        const slotIndex = state.board.length;
        const card = drawCard();
        await animateCardToBoard(slotIndex);
        playSfx("deal");
        state.board.push({ card, revealed: false });
        render();
        await sleep(210);
        state.board[slotIndex].revealed = true;
        markCardForFlip(card.id);
        playSfx("flip");
        render();
        await sleep(260);
      }
    }

    async function revealRemainingBoard() {
      clearStreetBets();
      if (state.board.length < 3) {
        logLine("No more bets. The flop arrives one card at a time.");
        await dealCommunityCards(3);
      }
      if (state.board.length < 4) {
        logLine("The turn card turns over.");
        await dealCommunityCards(1);
      }
      if (state.board.length < 5) {
        logLine("The river slips into place.");
        await dealCommunityCards(1);
      }
    }

    async function awardFoldPot() {
      state.busy = true;
      const winner = playersInHand().find(player => !player.folded);
      const pot = state.pot;
      if (winner) {
        winner.chips += pot;
        state.lastWinners = [winner.id];
        logAction(winner, `collects ${money(pot)} without a showdown`);
        state.showdownText = `${winner.isHuman ? "You win" : `${winner.name} wins`} the pot.`;
        playSfx("win");
      }
      endHand();
      state.busy = false;
      render();
    }

    async function showdown() {
      state.phase = "showdown";
      state.revealAll = true;
      state.thinkingId = null;
      state.awaitingHuman = false;
      playersInHand()
        .filter(player => !player.folded)
        .flatMap(player => player.hole)
        .forEach(card => markCardForFlip(card.id));
      render();
      playSfx("flip");
      await sleep(650);

      const contenders = playersInHand().filter(player => !player.folded);
      for (const player of contenders) {
        player.hand = evaluateBestHand(player.hole.concat(revealedBoardCards()));
      }

      const sidePots = buildSidePots();
      const awards = [];
      const winnerIds = new Set();

      for (const sidePot of sidePots) {
        const eligible = sidePot.eligible.filter(player => !player.folded);
        if (!eligible.length || sidePot.amount <= 0) continue;

        let best = null;
        let winners = [];
        for (const player of eligible) {
          if (!best || compareHands(player.hand, best) > 0) {
            best = player.hand;
            winners = [player];
          } else if (compareHands(player.hand, best) === 0) {
            winners.push(player);
          }
        }

        const share = Math.floor(sidePot.amount / winners.length);
        let remainder = sidePot.amount % winners.length;
        for (const winner of winners) {
          const extra = remainder > 0 ? 1 : 0;
          winner.chips += share + extra;
          remainder -= extra;
          winnerIds.add(winner.id);
        }

        awards.push(`${winnerSubject(winners)} ${winnerVerb(winners)} ${money(sidePot.amount)} with ${handDescription(best)}.`);
      }

      state.lastWinners = Array.from(winnerIds);
      const mainAward = awards[0] || "The pot is split by the board.";
      state.showdownText = mainAward;
      for (const award of awards) logLine(award);
      playSfx("win");
      endHand();
      render();
    }

    function buildSidePots() {
      const contributors = state.players.filter(player => player.totalBet > 0);
      const levels = Array.from(new Set(contributors.map(player => player.totalBet))).sort((a, b) => a - b);
      const pots = [];
      let previous = 0;

      for (const level of levels) {
        const involved = contributors.filter(player => player.totalBet >= level);
        const amount = (level - previous) * involved.length;
        pots.push({
          amount,
          eligible: involved.filter(player => !player.folded)
        });
        previous = level;
      }

      return pots;
    }

    function endHand() {
      state.handOver = true;
      state.awaitingHuman = false;
      state.thinkingId = null;
      state.currentActorIndex = null;
      state.currentBet = 0;
      state.minRaise = BIG_BLIND;
      for (const player of state.players) {
        player.roundBet = 0;
        player.totalBet = 0;
        player.acted = false;
        player.allIn = false;
        player.busted = player.chips <= 0;
      }
      updatePot();
      state.phase = "complete";
    }

    function clearStreetBets() {
      for (const player of state.players) {
        player.roundBet = 0;
        player.acted = false;
      }
      state.currentBet = 0;
      state.minRaise = BIG_BLIND;
      updatePot();
    }

    function updatePot() {
      state.pot = state.players.reduce((sum, player) => sum + player.totalBet, 0);
    }

    function newGame() {
      state.players = createPlayers(state.aiCount);
      state.dealerIndex = state.players.length - 1;
      state.handNumber = 0;
      state.passiveMeter = 0;
      state.log = [];
      state.lastWinners = [];
      state.showdownText = "";
      startNewHand();
    }

    /* =========================
       Flow helpers
    ========================= */

    function humanPlayer() {
      return state.players[0];
    }

    function playersInHand() {
      return state.players.filter(player => player.hole.length === 2 && !player.busted);
    }

    function revealedBoardCards() {
      return state.board.filter(item => item.revealed).map(item => item.card);
    }

    function canAct(player) {
      return player && !player.folded && !player.allIn && !player.busted && player.hole.length === 2;
    }

    function needsAction(player) {
      return canAct(player) && (!player.acted || player.roundBet < state.currentBet);
    }

    function bettingRoundComplete() {
      return !state.players.some(needsAction);
    }

    function shouldRunBoardToShowdown() {
      const live = playersInHand().filter(player => !player.folded);
      if (live.length <= 1) return false;
      return live.every(player => player.allIn || player.busted) && state.board.length < 5;
    }

    function singlePlayerRemaining() {
      return playersInHand().filter(player => !player.folded).length === 1;
    }

    function amountToCall(player) {
      return Math.max(0, state.currentBet - player.roundBet);
    }

    function minimumRaiseTarget() {
      return state.currentBet === 0 ? BIG_BLIND : state.currentBet + state.minRaise;
    }

    function canRaiseTo(player, target) {
      const maxTarget = player.roundBet + player.chips;
      const rounded = Math.round(target / 10) * 10;
      if (rounded > maxTarget || rounded <= state.currentBet) return false;
      if (rounded < minimumRaiseTarget() && rounded < maxTarget) return false;
      return true;
    }

    function nextLiveIndex(fromIndex) {
      for (let offset = 1; offset <= state.players.length; offset++) {
        const index = (fromIndex + offset) % state.players.length;
        if (state.players[index].chips > 0 || state.players[index].hole.length === 2) return index;
      }
      return fromIndex;
    }

    function firstPendingIndex(startIndex) {
      const start = startIndex ?? 0;
      for (let offset = 0; offset < state.players.length; offset++) {
        const index = (start + offset) % state.players.length;
        if (needsAction(state.players[index])) return index;
      }
      return null;
    }

    function logLine(message) {
      state.log.push(message);
      if (state.log.length > 80) state.log.shift();
    }

    function logAction(player, actionText) {
      const text = player.isHuman ? secondPersonAction(actionText) : actionText;
      logLine(`${player.name} ${text}.`);
    }

    function secondPersonAction(actionText) {
      return actionText
        .replace(/^posts\b/, "post")
        .replace(/^folds\b/, "fold")
        .replace(/^checks\b/, "check")
        .replace(/^calls\b/, "call")
        .replace(/^bets\b/, "bet")
        .replace(/^raises\b/, "raise")
        .replace(/^moves\b/, "move")
        .replace(/^collects\b/, "collect")
        .replace(/\bis all in\b/, "are all in");
    }

    function winnerSubject(winners) {
      return winners.map(player => player.isHuman ? "You" : player.name).join(" and ");
    }

    function winnerVerb(winners) {
      return winners.length > 1 || winners[0]?.isHuman ? "win" : "wins";
    }

    /* =========================
       Rendering
    ========================= */

    function render() {
      renderStatus();
      renderBoard();
      renderSeats();
      renderControls();
      renderLog();
      renderInfoPanels();
      renderQuotePanel();
      renderMagicAdvice();
      renderShowdown();
    }

    function renderStatus() {
      els.handNumber.textContent = String(Math.max(1, state.handNumber));
      els.dealerName.textContent = state.players[state.dealerIndex]?.name || "-";
      els.streetName.textContent = STREET_LABELS[state.phase] || state.phase;
      const human = humanPlayer();
      els.toCallText.textContent = human ? money(amountToCall(human)) : "0";
      els.blindText.textContent = `${money(SMALL_BLIND)} / ${money(BIG_BLIND)}`;
      els.potDisplay.textContent = `Pot ${money(state.pot)}`;
      els.roundNote.textContent = roundNoteText();
    }

    function roundNoteText() {
      if (state.thinkingId) return `${state.players.find(player => player.id === state.thinkingId)?.name || "Someone"} is thinking...`;
      if (state.awaitingHuman && !state.handOver) return "The action is yours.";
      if (state.handOver) return "The hand is complete.";
      if (state.phase === "setup") return "The deck is being dressed.";
      return "";
    }

    function renderBoard() {
      const slots = [];
      for (let i = 0; i < 5; i++) {
        const item = state.board[i];
        const card = item ? cardHTML(item.card, item.revealed, "community-card", consumeCardFlip(item.card.id)) : `<div class="card card-placeholder" aria-hidden="true"></div>`;
        slots.push(`<div class="board-slot" data-board-slot="${i}">${card}</div>`);
      }
      els.communityCards.innerHTML = slots.join("");
    }

    function renderSeats() {
      const total = state.players.length;
      els.seats.innerHTML = state.players.map((player, index) => seatHTML(player, seatClass(index, total))).join("");
    }

    function seatHTML(player, positionClass) {
      const isActor = state.currentActorIndex === player.index && !state.handOver && !player.folded && !player.busted;
      const classes = [
        "seat",
        positionClass,
        player.isHuman ? "human" : "",
        isActor ? "actor" : "",
        player.folded ? "folded" : "",
        player.busted ? "busted" : "",
        state.lastWinners.includes(player.id) ? "winner" : ""
      ].filter(Boolean).join(" ");

      const dealer = player.index === state.dealerIndex ? `<span class="dealer-chip">D</span>` : "";
      const status = player.busted ? "out" : player.folded ? "folded" : player.lastAction || (player.allIn ? "all in" : "");
      const thinking = state.thinkingId === player.id ? `<span class="thinking">thinking...</span>` : `<span>${status}</span>`;
      const bet = player.roundBet > 0 ? `<span class="bet-badge">bet ${money(player.roundBet)}</span>` : `<span></span>`;
      const showCards = player.isHuman || state.revealAll || (state.handOver && !player.folded && player.hand);
      const cards = [0, 1].map(i => {
        const card = player.hole[i];
        if (!card) return `<div class="card card-placeholder" aria-hidden="true"></div>`;
        return cardHTML(card, showCards && !player.folded, "hole-card", consumeCardFlip(card.id));
      }).join("");

      return `
        <article class="${classes}" data-player-id="${player.id}">
          <div class="seat-top">
            ${dealer}
            <span class="player-name" title="${escapeHTML(player.name)}">${escapeHTML(player.name)}</span>
            <span class="stack">${money(player.chips)}</span>
          </div>
          <div class="hole-cards">${cards}</div>
          <div class="seat-status">${thinking}${bet}</div>
        </article>
      `;
    }

    function seatClass(index, total) {
      if (total === 6) {
        return ["pos-bottom", "pos-left-bottom", "pos-left-top", "pos-top", "pos-right-top", "pos-right-bottom"][index];
      }
      if (total === 5) {
        return ["pos-bottom", "pos-left", "pos-top-left", "pos-top-right", "pos-right"][index];
      }
      return ["pos-bottom", "pos-left", "pos-top", "pos-right"][index];
    }

    function cardHTML(card, faceUp, extraClass = "", animate = false) {
      if (!faceUp) {
        return `<div class="card card-back ${extraClass}" aria-label="Face down card"></div>`;
      }
      const colorClass = card.color === "red" ? "red" : "black";
      const flipClass = animate ? "flip-new" : "";
      return `
        <div class="card face ${colorClass} ${extraClass} ${flipClass}" aria-label="${card.label} of ${card.suit}">
          <div class="corner top"><span class="rank">${card.label}</span><span>${card.symbol}</span></div>
          <div class="pip">${card.symbol}</div>
          <div class="corner bottom"><span class="rank">${card.label}</span><span>${card.symbol}</span></div>
        </div>
      `;
    }

    function renderControls() {
      const human = humanPlayer();
      const humanTurn = Boolean(state.awaitingHuman && human && !state.handOver && canAct(human));
      const callAmount = human ? amountToCall(human) : 0;
      const maxTarget = human ? human.roundBet + human.chips : 0;
      const minTarget = human ? Math.min(maxTarget, minimumRaiseTarget()) : 0;
      const raisePossible = humanTurn && human && maxTarget > state.currentBet && maxTarget >= minTarget && canRaiseTo(human, minTarget);

      els.foldBtn.disabled = !humanTurn;
      els.checkBtn.disabled = !humanTurn || callAmount > 0;
      els.callBtn.disabled = !humanTurn || callAmount <= 0;
      els.raiseBtn.disabled = !raisePossible;
      els.raiseSlider.disabled = !raisePossible;
      els.allInBtn.disabled = !humanTurn || !human || human.chips <= 0;
      els.newHandBtn.disabled = !state.handOver || state.busy;

      els.callBtn.textContent = callAmount > 0 ? `Call ${money(Math.min(callAmount, human?.chips || 0))}` : "Call";
      const verb = state.currentBet > 0 ? "Raise" : "Bet";
      els.raiseBtn.textContent = verb;

      if (human) {
        els.raiseSlider.min = String(Math.max(0, minTarget));
        els.raiseSlider.max = String(Math.max(0, maxTarget));
        els.raiseSlider.step = "10";
        const current = Number(els.raiseSlider.value || minTarget);
        const nextValue = raisePossible ? clamp(current, minTarget, maxTarget) : minTarget;
        els.raiseSlider.value = String(Math.round(nextValue / 10) * 10);
        els.raiseLabel.textContent = `${verb} ${money(Number(els.raiseSlider.value || 0))}`;
      }
    }

    function renderLog() {
      const lines = state.log.slice(-9);
      els.logLines.innerHTML = lines.map(line => `<div>${escapeHTML(line)}</div>`).join("");
      els.messageLog.classList.toggle("hidden", !state.showDealerNote);
      els.noteToggleBtn.classList.toggle("active", state.showDealerNote);
      els.noteToggleBtn.setAttribute("aria-expanded", String(state.showDealerNote));
      els.noteToggleBtn.setAttribute("aria-pressed", String(state.showDealerNote));
    }

    function renderInfoPanels() {
      els.oddsPanel.classList.toggle("hidden", !state.showOdds);
      els.oddsToggleBtn.classList.toggle("active", state.showOdds);
      els.oddsToggleBtn.setAttribute("aria-expanded", String(state.showOdds));
      els.oddsToggleBtn.setAttribute("aria-pressed", String(state.showOdds));

      els.handInfoPanel.classList.toggle("hidden", !state.showHandInfo);
      els.handInfoToggleBtn.classList.toggle("active", state.showHandInfo);
      els.handInfoToggleBtn.setAttribute("aria-expanded", String(state.showHandInfo));
      els.handInfoToggleBtn.setAttribute("aria-pressed", String(state.showHandInfo));

      if (state.showOdds) {
        const odds = estimateHumanEquity();
        els.oddsValue.textContent = odds.main;
        els.oddsDetail.textContent = odds.detail;
      }

      if (state.showHandInfo) {
        const info = currentHumanHandInfo();
        els.handInfoValue.textContent = info.main;
        els.handInfoDetail.textContent = info.detail;
      }
    }

    function renderQuotePanel() {
      els.quotePanel.classList.toggle("hidden", !state.showQuotes);
      els.quoteToggleBtn.classList.toggle("active", state.showQuotes);
      els.quoteToggleBtn.setAttribute("aria-expanded", String(state.showQuotes));
      els.quoteToggleBtn.setAttribute("aria-pressed", String(state.showQuotes));
      els.quoteText.textContent = TABLE_QUOTES[state.quoteIndex] || "";
    }

    function renderMagicAdvice() {
      els.magicAdvicePanel.classList.toggle("hidden", !state.showMagicAdvice);
      els.magicAdviceText.textContent = MAGIC_ADVICE[state.magicAdviceIndex] || "";
    }

    function currentHumanHandInfo() {
      const human = humanPlayer();
      if (!human || human.hole.length < 2) {
        return { main: "No cards yet", detail: "The dealer has not found you in the smoke." };
      }
      if (human.folded) {
        return { main: "Folded", detail: `${cardText(human.hole[0])} ${cardText(human.hole[1])}` };
      }

      const board = revealedBoardCards();
      if (board.length >= 3) {
        const result = evaluateBestHand(human.hole.concat(board));
        return {
          main: result.name,
          detail: `Best five: ${result.cards.map(cardText).join(" ")}`
        };
      }

      const sorted = human.hole.slice().sort((a, b) => b.value - a.value);
      const [high, low] = sorted;
      const suited = high.suit === low.suit;
      const gap = Math.abs(high.value - low.value);
      if (high.value === low.value) {
        return {
          main: `Pocket ${rankPlural(high)}`,
          detail: `${cardText(high)} ${cardText(low)} before the flop.`
        };
      }

      const texture = [
        suited ? "suited" : "off-suit",
        gap === 1 ? "connected" : gap === 2 ? "one-gap" : ""
      ].filter(Boolean).join(", ");

      return {
        main: `${high.label} high`,
        detail: `${cardText(high)} ${cardText(low)}${texture ? `, ${texture}` : ""}.`
      };
    }

    function rankPlural(card) {
      if (card.value === 14) return "Aces";
      if (card.value === 13) return "Kings";
      if (card.value === 12) return "Queens";
      if (card.value === 11) return "Jacks";
      return `${card.label}s`;
    }

    function estimateHumanEquity() {
      const human = humanPlayer();
      if (!human || human.hole.length < 2) {
        return { main: "--", detail: "Odds appear once your cards are dealt." };
      }
      if (human.folded || human.busted) {
        return { main: "0%", detail: "Folded hands do not chase rivers." };
      }

      const opponentCount = playersInHand().filter(player => !player.isHuman && !player.folded && !player.busted).length;
      if (opponentCount === 0) {
        return { main: "100%", detail: "No live opponent remains in the hand." };
      }

      const board = revealedBoardCards();
      const key = [
        human.hole.map(cardKey).join(","),
        board.map(cardKey).join(","),
        opponentCount,
        state.phase,
        state.players.map(player => `${player.id}:${player.folded ? 1 : 0}:${player.busted ? 1 : 0}`).join("|")
      ].join("/");

      if (state.equityCacheKey === key && state.equityCache) {
        return state.equityCache;
      }

      const iterations = board.length >= 3 ? 900 : 650;
      const knownKeys = new Set(human.hole.concat(board).map(cardKey));
      const unknownDeck = freshDeck().filter(card => !knownKeys.has(cardKey(card)));
      let wins = 0;
      let ties = 0;

      for (let i = 0; i < iterations; i++) {
        const simDeck = shuffle(unknownDeck);
        let cursor = 0;
        const simBoard = board.slice();
        const opponentHoles = [];

        for (let opp = 0; opp < opponentCount; opp++) {
          opponentHoles.push([simDeck[cursor++], simDeck[cursor++]]);
        }

        while (simBoard.length < 5) {
          simBoard.push(simDeck[cursor++]);
        }

        const heroHand = evaluateBestHand(human.hole.concat(simBoard));
        let heroIsBest = true;
        let heroTied = false;

        for (const hole of opponentHoles) {
          const villainHand = evaluateBestHand(hole.concat(simBoard));
          const comparison = compareHands(heroHand, villainHand);
          if (comparison < 0) {
            heroIsBest = false;
            heroTied = false;
            break;
          }
          if (comparison === 0) heroTied = true;
        }

        if (heroIsBest && heroTied) ties += 1;
        else if (heroIsBest) wins += 1;
      }

      const winPct = Math.round((wins / iterations) * 100);
      const tiePct = Math.round((ties / iterations) * 100);
      const result = {
        main: `${winPct}%`,
        detail: `Tie ${tiePct}% vs ${opponentCount} live opponent${opponentCount === 1 ? "" : "s"} (${iterations} samples).`
      };

      state.equityCacheKey = key;
      state.equityCache = result;
      return result;
    }

    function renderShowdown() {
      if (!state.showdownText) {
        els.showdownBanner.classList.add("hidden");
        els.showdownBanner.innerHTML = "";
        return;
      }

      let detail = "";
      const winners = state.players.filter(player => state.lastWinners.includes(player.id) && player.hand);
      if (winners.length) {
        detail = winners.map(player => `${player.name}: ${player.hand.name}`).join(" | ");
      }
      els.showdownBanner.classList.remove("hidden");
      els.showdownBanner.innerHTML = `<strong>${escapeHTML(state.showdownText)}</strong>${escapeHTML(detail)}`;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setRandomQuote() {
      let next = Math.floor(Math.random() * TABLE_QUOTES.length);
      if (TABLE_QUOTES.length > 1 && next === state.quoteIndex) {
        next = (next + 1) % TABLE_QUOTES.length;
      }
      state.quoteIndex = next;
      renderQuotePanel();
    }

    function nextQuote() {
      state.quoteIndex = (state.quoteIndex + 1) % TABLE_QUOTES.length;
      renderQuotePanel();
    }

    function askMagicBall() {
      let next = Math.floor(Math.random() * MAGIC_ADVICE.length);
      if (MAGIC_ADVICE.length > 1 && next === state.magicAdviceIndex) {
        next = (next + 1) % MAGIC_ADVICE.length;
      }
      state.magicAdviceIndex = next;
      state.showMagicAdvice = true;
      els.magicBallBtn.classList.remove("shake");
      void els.magicBallBtn.offsetWidth;
      els.magicBallBtn.classList.add("shake");
      window.setTimeout(() => els.magicBallBtn.classList.remove("shake"), 460);
      renderMagicAdvice();
    }

    /* =========================
       Animation helpers
    ========================= */

    async function animateCardToSeat(playerId) {
      const target = document.querySelector(`[data-player-id="${playerId}"] .hole-cards`) ||
        document.querySelector(`[data-player-id="${playerId}"]`);
      await animateCardFlight(target);
    }

    async function animateCardToBoard(slotIndex) {
      const target = document.querySelector(`[data-board-slot="${slotIndex}"]`);
      await animateCardFlight(target);
    }

    async function animateCardFlight(target) {
      const deck = els.deckZone.getBoundingClientRect();
      const to = target?.getBoundingClientRect();
      if (!to || !deck.width) {
        await sleep(120);
        return;
      }

      const card = document.createElement("div");
      card.className = "card card-back flying-card";
      card.style.width = `${deck.width}px`;
      card.style.height = `${deck.height}px`;
      card.style.left = `${deck.left}px`;
      card.style.top = `${deck.top}px`;
      document.body.appendChild(card);

      const startX = deck.left;
      const startY = deck.top;
      const endX = to.left + to.width / 2 - deck.width / 2;
      const endY = to.top + to.height / 2 - deck.height / 2;
      const rotate = (Math.random() * 12 - 6).toFixed(2);

      try {
        await card.animate([
          { transform: "translate3d(0, 0, 0) rotate(3deg)", opacity: 0.96 },
          { transform: `translate3d(${(endX - startX) * 0.55}px, ${(endY - startY) * 0.42 - 28}px, 0) rotate(${rotate}deg)`, opacity: 1 },
          { transform: `translate3d(${endX - startX}px, ${endY - startY}px, 0) rotate(${rotate}deg)`, opacity: 0.16 }
        ], {
          duration: 210,
          easing: "cubic-bezier(0.22, 0.74, 0.24, 1)"
        }).finished;
      } finally {
        card.remove();
      }
    }

    async function animateChips(playerId) {
      const fromEl = document.querySelector(`[data-player-id="${playerId}"]`);
      const toEl = els.potDisplay;
      const from = fromEl?.getBoundingClientRect();
      const to = toEl?.getBoundingClientRect();
      if (!from || !to) {
        await sleep(120);
        return;
      }

      const chip = document.createElement("div");
      chip.className = "chip-fly";
      const startX = from.left + from.width / 2;
      const startY = from.top + from.height / 2;
      const endX = to.left + to.width / 2;
      const endY = to.top + to.height / 2;
      chip.style.left = `${startX}px`;
      chip.style.top = `${startY}px`;
      document.body.appendChild(chip);

      try {
        await chip.animate([
          { transform: "translate(-50%, -50%) scale(1)", opacity: 0.95 },
          { transform: `translate(${endX - startX - 9}px, ${endY - startY - 18}px) scale(0.9)`, opacity: 0.85 },
          { transform: `translate(${endX - startX - 9}px, ${endY - startY - 9}px) scale(0.35)`, opacity: 0 }
        ], {
          duration: 260,
          easing: "cubic-bezier(0.2, 0.78, 0.25, 1)"
        }).finished;
      } finally {
        chip.remove();
      }
    }

    /* =========================
       Audio helpers
    ========================= */

    function unlockAudio() {
      if (audio.unlocked) return;
      initAudio();
      if (!audio.ctx) return;
      audio.ctx.resume();
      audio.unlocked = true;
      if (audio.musicEnabled) startMusic();
    }

    function initAudio() {
      if (audio.ctx) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      audio.ctx = new AudioContext();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0.85;
      audio.master.connect(audio.ctx.destination);

      audio.sfxGain = audio.ctx.createGain();
      audio.sfxGain.gain.value = 0.72;
      audio.sfxGain.connect(audio.master);

      audio.musicGain = audio.ctx.createGain();
      audio.musicGain.gain.value = 0.16;
      audio.musicGain.connect(audio.master);
    }

    function playSfx(kind) {
      if (!audio.sfxEnabled) return;
      initAudio();
      if (!audio.ctx) return;
      const now = audio.ctx.currentTime;

      if (kind === "deal") {
        noiseBurst(now, 0.105, 850, 0.030, "bandpass");
        tone(210, now, 0.055, "triangle", 0.018, audio.sfxGain, 0.005, 0.05);
      } else if (kind === "flip") {
        noiseBurst(now, 0.075, 1400, 0.035, "highpass");
        tone(360, now + 0.015, 0.055, "sine", 0.018, audio.sfxGain, 0.003, 0.045);
      } else if (kind === "chip") {
        tone(840, now, 0.055, "triangle", 0.026, audio.sfxGain, 0.002, 0.04);
        tone(1180, now + 0.035, 0.06, "sine", 0.018, audio.sfxGain, 0.002, 0.05);
        noiseBurst(now + 0.015, 0.055, 2200, 0.014, "bandpass");
      } else if (kind === "button") {
        tone(520, now, 0.04, "triangle", 0.020, audio.sfxGain, 0.002, 0.03);
      } else if (kind === "win") {
        [330, 392, 494, 659].forEach((freq, index) => {
          tone(freq, now + index * 0.09, 0.24, "sine", 0.025, audio.sfxGain, 0.015, 0.18);
        });
      } else if (kind === "error") {
        tone(110, now, 0.13, "sawtooth", 0.020, audio.sfxGain, 0.003, 0.09);
      }
    }

    function noiseBurst(start, duration, frequency, gainValue, filterType) {
      const ctx = audio.ctx;
      const samples = Math.max(1, Math.floor(ctx.sampleRate * duration));
      const buffer = ctx.createBuffer(1, samples, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < samples; i++) {
        const fade = 1 - i / samples;
        data[i] = (Math.random() * 2 - 1) * fade;
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = filterType;
      filter.frequency.value = frequency;
      filter.Q.value = 0.85;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(audio.sfxGain);
      source.start(start);
      source.stop(start + duration + 0.01);
    }

    function tone(freq, start, duration, type, gainValue, destination, attack = 0.01, release = 0.10) {
      const ctx = audio.ctx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, gainValue), start + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + release);
      osc.connect(gain);
      gain.connect(destination);
      osc.start(start);
      osc.stop(start + duration + release + 0.02);
      return osc;
    }

    function startMusic() {
      initAudio();
      if (!audio.ctx || !audio.musicEnabled) return;
      stopMusic();
      scheduleMusicCycle();
      audio.musicTimer = window.setInterval(() => {
        if (audio.ctx.currentTime > audio.musicCycleEnds - 2.5) scheduleMusicCycle();
      }, 900);
    }

    function stopMusic() {
      if (audio.musicTimer) {
        window.clearInterval(audio.musicTimer);
        audio.musicTimer = null;
      }
    }

    function scheduleMusicCycle() {
      const ctx = audio.ctx;
      const beat = 60 / 78;
      const start = Math.max(ctx.currentTime + 0.08, audio.musicCycleEnds || 0);
      const chords = [
        { root: 220.00, intervals: [0, 3, 7, 10, 14] },
        { root: 146.83, intervals: [0, 4, 7, 10, 14] },
        { root: 196.00, intervals: [0, 4, 7, 11, 14] },
        { root: 164.81, intervals: [0, 3, 7, 10, 14] }
      ];

      chords.forEach((chord, bar) => {
        const barStart = start + bar * beat * 4;
        scheduleChord(chord, barStart, beat * 3.72);
        scheduleBass(chord.root / 2, barStart, beat);
        scheduleBrush(barStart, beat);
        scheduleLead(chord.root, barStart, beat, bar);
      });

      audio.musicCycleEnds = start + chords.length * beat * 4;
    }

    function scheduleChord(chord, start, duration) {
      chord.intervals.forEach((interval, index) => {
        const freq = chord.root * Math.pow(2, interval / 12);
        tone(freq, start + index * 0.018, duration, "triangle", 0.007, audio.musicGain, 0.08, 0.75);
      });
    }

    function scheduleBass(root, start, beat) {
      const notes = [root, root * 1.5, root * 1.25, root * 1.5];
      notes.forEach((freq, index) => {
        tone(freq, start + index * beat, beat * 0.58, "sine", 0.026, audio.musicGain, 0.018, 0.20);
      });
    }

    function scheduleBrush(start, beat) {
      for (let i = 0; i < 8; i++) {
        const when = start + i * beat * 0.5 + (i % 2 ? beat * 0.08 : 0);
        musicNoise(when, 0.08, 2900, i % 2 ? 0.008 : 0.004);
      }
    }

    function scheduleLead(root, start, beat, bar) {
      const phrases = [
        [7, 10, 12],
        [14, 12, 10],
        [4, 7, 11],
        [10, 7, 3]
      ];
      const phrase = phrases[bar % phrases.length];
      phrase.forEach((interval, index) => {
        const freq = root * Math.pow(2, interval / 12);
        tone(freq, start + beat * (1.45 + index * 0.52), beat * 0.36, "sine", 0.010, audio.musicGain, 0.04, 0.20);
      });
    }

    function musicNoise(start, duration, frequency, gainValue) {
      const ctx = audio.ctx;
      const samples = Math.floor(ctx.sampleRate * duration);
      const buffer = ctx.createBuffer(1, samples, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < samples; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / samples);
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = "highpass";
      filter.frequency.value = frequency;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(audio.musicGain);
      source.start(start);
      source.stop(start + duration + 0.01);
    }

    /* =========================
       Event listeners
    ========================= */

    function cacheElements() {
      const ids = [
        "titleScreen", "gameScreen", "titleDifficulty", "titleOpponents", "titleMusic", "titleSfx",
        "startGameBtn", "gameDifficulty", "gameMusic", "gameSfx", "blindText", "handNumber",
        "dealerName", "streetName", "toCallText", "pokerTable", "deckZone", "communityCards",
        "potDisplay", "roundNote", "seats", "messageLog", "logLines", "oddsPanel", "oddsValue",
        "oddsDetail", "handInfoPanel", "handInfoValue", "handInfoDetail", "showdownBanner",
        "quoteToggleBtn", "quoteNextBtn", "quotePanel", "quoteText",
        "magicBallBtn", "magicAdvicePanel", "magicAdviceText",
        "foldBtn", "checkBtn", "callBtn", "raiseLabel", "raiseSlider", "raiseBtn", "allInBtn",
        "oddsToggleBtn", "handInfoToggleBtn", "noteToggleBtn", "newHandBtn", "newGameBtn"
      ];
      for (const id of ids) els[id] = document.getElementById(id);
    }

    function wireEvents() {
      document.addEventListener("pointerdown", unlockAudio, { once: true });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && !els.titleScreen.classList.contains("hidden")) return;
        if (event.key.toLowerCase() === "f") handleHumanAction("fold");
        if (event.key.toLowerCase() === "c") {
          const human = humanPlayer();
          if (human && amountToCall(human) > 0) handleHumanAction("call");
          else handleHumanAction("check");
        }
        if (event.key.toLowerCase() === "a") handleHumanAction("allin");
      });

      els.startGameBtn.addEventListener("click", () => {
        playSfx("button");
        startGame();
      });

      els.foldBtn.addEventListener("click", () => handleHumanAction("fold"));
      els.checkBtn.addEventListener("click", () => handleHumanAction("check"));
      els.callBtn.addEventListener("click", () => handleHumanAction("call"));
      els.raiseBtn.addEventListener("click", () => handleHumanAction("raise"));
      els.allInBtn.addEventListener("click", () => handleHumanAction("allin"));
      els.oddsToggleBtn.addEventListener("click", () => {
        playSfx("button");
        state.showOdds = !state.showOdds;
        state.equityCacheKey = "";
        state.equityCache = null;
        renderInfoPanels();
      });
      els.handInfoToggleBtn.addEventListener("click", () => {
        playSfx("button");
        state.showHandInfo = !state.showHandInfo;
        renderInfoPanels();
      });
      els.noteToggleBtn.addEventListener("click", () => {
        playSfx("button");
        state.showDealerNote = !state.showDealerNote;
        renderLog();
      });
      els.quoteToggleBtn.addEventListener("click", () => {
        playSfx("button");
        state.showQuotes = !state.showQuotes;
        renderQuotePanel();
      });
      els.quoteNextBtn.addEventListener("click", () => {
        playSfx("button");
        if (!state.showQuotes) state.showQuotes = true;
        nextQuote();
      });
      els.magicBallBtn.addEventListener("click", () => {
        playSfx("chip");
        askMagicBall();
      });
      els.newHandBtn.addEventListener("click", () => {
        playSfx("button");
        startNewHand();
      });
      els.newGameBtn.addEventListener("click", () => {
        playSfx("button");
        newGame();
      });
      els.raiseSlider.addEventListener("input", () => {
        const verb = state.currentBet > 0 ? "Raise" : "Bet";
        els.raiseLabel.textContent = `${verb} ${money(Number(els.raiseSlider.value || 0))}`;
      });

      els.titleDifficulty.addEventListener("change", () => {
        state.difficulty = els.titleDifficulty.value;
        els.gameDifficulty.value = state.difficulty;
      });
      els.gameDifficulty.addEventListener("change", () => {
        state.difficulty = els.gameDifficulty.value;
        els.titleDifficulty.value = state.difficulty;
        logLine(`The table mood shifts to ${state.difficulty}.`);
        renderLog();
      });

      els.titleMusic.addEventListener("change", () => setMusicEnabled(els.titleMusic.checked));
      els.gameMusic.addEventListener("change", () => setMusicEnabled(els.gameMusic.checked));
      els.titleSfx.addEventListener("change", () => setSfxEnabled(els.titleSfx.checked));
      els.gameSfx.addEventListener("change", () => setSfxEnabled(els.gameSfx.checked));
    }

    function setMusicEnabled(enabled) {
      audio.musicEnabled = enabled;
      els.titleMusic.checked = enabled;
      els.gameMusic.checked = enabled;
      if (enabled) {
        unlockAudio();
        startMusic();
      } else {
        stopMusic();
      }
    }

    function setSfxEnabled(enabled) {
      audio.sfxEnabled = enabled;
      els.titleSfx.checked = enabled;
      els.gameSfx.checked = enabled;
    }

    function syncSettingsControls() {
      els.titleDifficulty.value = state.difficulty;
      els.gameDifficulty.value = state.difficulty;
      els.titleMusic.checked = audio.musicEnabled;
      els.gameMusic.checked = audio.musicEnabled;
      els.titleSfx.checked = audio.sfxEnabled;
      els.gameSfx.checked = audio.sfxEnabled;
    }

    function boot() {
      cacheElements();
      wireEvents();
      state.quoteIndex = Math.floor(Math.random() * TABLE_QUOTES.length);
      state.magicAdviceIndex = Math.floor(Math.random() * MAGIC_ADVICE.length);
      syncSettingsControls();
      renderBoard();
      renderControls();
      renderLog();
      renderInfoPanels();
      renderQuotePanel();
      renderMagicAdvice();
      window.setInterval(() => {
        if (state.showQuotes) setRandomQuote();
      }, 19000);
    }

    boot();
  </script>

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(error => {
          console.warn("Service worker registration failed:", error);
        });
      });
    }
