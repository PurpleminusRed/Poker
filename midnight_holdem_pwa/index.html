<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080605" />
  <meta name="description" content="A smoky offline Texas Hold'em poker game with AI opponents." />
  <meta name="application-name" content="Midnight Hold'em" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Midnight Hold'em" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Midnight Hold'em</title>
  <style>
    :root {
      --gold: #d7ad5d;
      --gold-soft: #f0d59a;
      --amber: #b86d28;
      --mahogany: #24130f;
      --walnut: #3b2018;
      --felt: #173f34;
      --felt-dark: #0b211e;
      --burgundy: #521f2d;
      --cream: #f3ead4;
      --ink: #1a1715;
      --muted: #bcae92;
      --shadow: rgba(0, 0, 0, 0.55);
      --card-w: clamp(44px, 6.2vw, 72px);
      --card-h: calc(var(--card-w) * 1.42);
      --seat-w: clamp(150px, 18vw, 218px);
      --radius: 8px;
      font-family: "Copperplate", "Baskerville", "Georgia", serif;
      color: var(--cream);
      background: #080605;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(circle at 16% 14%, rgba(247, 191, 94, 0.20), transparent 25%),
        radial-gradient(circle at 82% 10%, rgba(212, 136, 50, 0.16), transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(105, 37, 33, 0.30), transparent 34%),
        linear-gradient(145deg, #070606 0%, #160d0b 42%, #0b0808 100%);
      min-height: 100vh;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -15%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(ellipse at 28% 22%, rgba(244, 197, 116, 0.12), transparent 18%),
        radial-gradient(ellipse at 70% 30%, rgba(255, 228, 171, 0.08), transparent 17%),
        repeating-linear-gradient(112deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 34px);
      filter: blur(10px);
      animation: hazeDrift 18s ease-in-out infinite alternate;
      opacity: 0.95;
    }

    body::after {
      background:
        linear-gradient(90deg, transparent 0 12%, rgba(230, 174, 91, 0.07) 13%, transparent 14% 48%, rgba(230, 174, 91, 0.05) 49%, transparent 50% 100%),
        repeating-linear-gradient(0deg, rgba(215, 173, 93, 0.025) 0 2px, transparent 2px 12px);
      mix-blend-mode: screen;
      opacity: 0.42;
      animation: lightShimmer 10s ease-in-out infinite;
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 1px solid rgba(215, 173, 93, 0.55);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(246, 214, 150, 0.20), rgba(112, 65, 30, 0.28)),
        #24140f;
      color: var(--cream);
      min-height: 40px;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: transform 160ms ease, border-color 160ms ease, opacity 160ms ease, background 160ms ease;
      letter-spacing: 0;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(245, 216, 158, 0.90);
      background:
        linear-gradient(180deg, rgba(255, 225, 166, 0.28), rgba(139, 79, 35, 0.35)),
        #2d1811;
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      filter: grayscale(0.28);
    }

    select {
      min-height: 38px;
      border: 1px solid rgba(215, 173, 93, 0.50);
      border-radius: var(--radius);
      background: #160d0a;
      color: var(--cream);
      padding: 8px 36px 8px 10px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    input[type="range"] {
      accent-color: var(--gold);
      width: min(42vw, 300px);
      max-width: 100%;
    }

    .screen {
      position: relative;
      z-index: 1;
    }

    .hidden {
      display: none !important;
    }

    .title-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .title-panel {
      position: relative;
      width: min(860px, 100%);
      min-height: 560px;
      display: grid;
      align-content: center;
      gap: 26px;
      padding: clamp(28px, 6vw, 68px);
      overflow: hidden;
      border: 1px solid rgba(215, 173, 93, 0.48);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 216, 142, 0.10), transparent 30%),
        radial-gradient(circle at 50% 0%, rgba(255, 192, 94, 0.22), transparent 30%),
        linear-gradient(180deg, rgba(64, 31, 20, 0.90), rgba(16, 10, 9, 0.94)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 28px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.68), inset 0 0 60px rgba(0, 0, 0, 0.52);
    }

    .title-panel::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(215, 173, 93, 0.32);
      border-radius: 6px;
      pointer-events: none;
    }

    .title-panel::after {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 32%, rgba(255, 228, 159, 0.18), transparent 16%),
        radial-gradient(circle at 72% 50%, rgba(255, 228, 159, 0.10), transparent 14%);
      filter: blur(24px);
      animation: lampPulse 7s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .title-copy,
    .title-settings {
      position: relative;
      z-index: 1;
    }

    .kicker {
      color: var(--gold-soft);
      font-size: clamp(0.78rem, 1.5vw, 0.95rem);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: clamp(3.1rem, 10vw, 7.7rem);
      line-height: 0.88;
      font-weight: 700;
      letter-spacing: 0;
      text-shadow: 0 6px 26px rgba(0, 0, 0, 0.62), 0 0 24px rgba(215, 173, 93, 0.22);
    }

    .subtitle {
      max-width: 560px;
      margin: 0;
      color: #ddceb2;
      font-size: clamp(1.02rem, 2.4vw, 1.35rem);
      line-height: 1.55;
    }

    .title-settings {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: 14px;
      max-width: 720px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 150px;
    }

    .field label,
    .toggle span {
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .start-button {
      min-width: 178px;
      color: #1b100a;
      background:
        linear-gradient(180deg, #fee1a3, #b98236),
        #d7ad5d;
      border-color: rgba(255, 233, 181, 0.85);
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45), 0 0 32px rgba(215, 173, 93, 0.20);
    }

    .game-screen {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 14px clamp(10px, 2vw, 24px) 16px;
    }

    .topbar,
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 4;
      width: min(1380px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(215, 173, 93, 0.26);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 226, 160, 0.08), rgba(0, 0, 0, 0.18)),
        rgba(18, 10, 8, 0.84);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
    }

    .topbar {
      padding: 10px 12px;
    }

    .brand {
      display: grid;
      gap: 2px;
      min-width: max-content;
    }

    .brand-title {
      color: #ffe0a2;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .status-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-strip strong {
      color: var(--cream);
      font-weight: 700;
    }

    .settings-row,
    .audio-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      padding: 7px 9px;
      border: 1px solid rgba(215, 173, 93, 0.22);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    .toggle input {
      width: 17px;
      height: 17px;
      accent-color: var(--gold);
    }

    .table-stage {
      position: relative;
      z-index: 1;
      width: min(1380px, 100%);
      min-height: 650px;
      height: min(72vh, 790px);
      margin: 0 auto;
    }

    .lamp {
      position: absolute;
      top: -26px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 219, 145, 0.38), rgba(190, 101, 34, 0.10) 38%, transparent 68%);
      filter: blur(10px);
      pointer-events: none;
      animation: lampPulse 5.5s ease-in-out infinite alternate;
    }

    .lamp.left {
      left: 5%;
    }

    .lamp.right {
      right: 5%;
      animation-delay: -2s;
    }

    .poker-table {
      position: absolute;
      inset: 58px clamp(8px, 3vw, 48px) 72px;
      overflow: visible;
      border-radius: 48% / 42%;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(255, 255, 255, 0.05), transparent 46%),
        repeating-radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.022) 0 2px, transparent 2px 8px),
        linear-gradient(155deg, rgba(23, 63, 52, 0.96), rgba(9, 31, 27, 0.98));
      border: clamp(10px, 1.5vw, 18px) solid #3a2117;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.70),
        inset 0 0 0 5px rgba(215, 173, 93, 0.72),
        inset 0 0 0 11px rgba(67, 33, 20, 0.90),
        inset 0 0 80px rgba(0, 0, 0, 0.50);
    }

    .poker-table::before {
      content: "";
      position: absolute;
      inset: 28px;
      border-radius: 48% / 42%;
      border: 1px solid rgba(215, 173, 93, 0.34);
      box-shadow: inset 0 0 24px rgba(215, 173, 93, 0.09);
      pointer-events: none;
    }

    .poker-table::after {
      content: "";
      position: absolute;
      inset: 16%;
      border-radius: 50%;
      background:
        linear-gradient(90deg, transparent 0 19%, rgba(215, 173, 93, 0.08) 19% 20%, transparent 20% 80%, rgba(215, 173, 93, 0.08) 80% 81%, transparent 81%),
        linear-gradient(0deg, transparent 0 19%, rgba(215, 173, 93, 0.08) 19% 20%, transparent 20% 80%, rgba(215, 173, 93, 0.08) 80% 81%, transparent 81%);
      opacity: 0.32;
      pointer-events: none;
    }

    .center-felt {
      position: absolute;
      inset: 31% 23%;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 12px;
      z-index: 2;
    }

    .deck-zone {
      position: absolute;
      right: 18%;
      top: 42%;
      width: var(--card-w);
      height: var(--card-h);
      z-index: 3;
      transform: rotate(4deg);
    }

    .deck-stack {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.10), transparent 35%),
        repeating-linear-gradient(45deg, rgba(215, 173, 93, 0.38) 0 2px, transparent 2px 8px),
        #281411;
      border: 1px solid rgba(245, 221, 169, 0.55);
      box-shadow:
        4px 4px 0 rgba(245, 234, 203, 0.12),
        8px 8px 0 rgba(0, 0, 0, 0.30),
        0 12px 24px rgba(0, 0, 0, 0.38);
    }

    .deck-stack::after {
      content: "MH";
      position: absolute;
      inset: 11px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(215, 173, 93, 0.58);
      border-radius: 5px;
      color: rgba(255, 226, 169, 0.72);
      font-weight: 700;
      font-size: calc(var(--card-w) * 0.22);
    }

    .community {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(5px, 0.8vw, 10px);
      min-height: var(--card-h);
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(4, 15, 13, 0.24);
      box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.26);
    }

    .board-slot {
      width: var(--card-w);
      height: var(--card-h);
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px dashed rgba(215, 173, 93, 0.24);
      background: rgba(255, 255, 255, 0.025);
    }

    .pot-display {
      min-width: 154px;
      text-align: center;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(215, 173, 93, 0.45);
      color: #ffe2a8;
      background:
        linear-gradient(180deg, rgba(255, 232, 177, 0.10), rgba(0, 0, 0, 0.20)),
        rgba(15, 9, 7, 0.74);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
      font-weight: 700;
    }

    .round-note {
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 22px;
      text-align: center;
    }

    .seats {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .seat {
      position: absolute;
      width: var(--seat-w);
      min-height: 138px;
      padding: 10px;
      border: 1px solid rgba(215, 173, 93, 0.26);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 232, 178, 0.08), rgba(0, 0, 0, 0.22)),
        rgba(18, 10, 8, 0.78);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transform: translate(-50%, -50%);
      transition: opacity 240ms ease, filter 240ms ease, box-shadow 240ms ease, border-color 240ms ease;
      pointer-events: auto;
    }

    .seat.human {
      background:
        linear-gradient(180deg, rgba(255, 229, 168, 0.13), rgba(0, 0, 0, 0.20)),
        rgba(29, 15, 11, 0.88);
      border-color: rgba(245, 215, 151, 0.45);
    }

    .seat.actor {
      border-color: rgba(255, 226, 160, 0.95);
      box-shadow:
        0 0 0 2px rgba(215, 173, 93, 0.25),
        0 0 36px rgba(215, 173, 93, 0.34),
        0 16px 32px rgba(0, 0, 0, 0.48);
    }

    .seat.folded {
      opacity: 0.48;
      filter: saturate(0.45);
    }

    .seat.winner {
      animation: winnerGlow 1.2s ease-in-out infinite alternate;
    }

    .seat.busted {
      opacity: 0.32;
      filter: grayscale(0.6);
    }

    .pos-bottom { left: 50%; top: 97%; }
    .pos-left-bottom { left: 8%; top: 72%; }
    .pos-left-top { left: 10%; top: 25%; }
    .pos-top { left: 50%; top: 7%; }
    .pos-right-top { left: 90%; top: 25%; }
    .pos-right-bottom { left: 92%; top: 72%; }
    .pos-left { left: 8%; top: 50%; }
    .pos-right { left: 92%; top: 50%; }
    .pos-top-left { left: 28%; top: 5%; }
    .pos-top-right { left: 72%; top: 5%; }

    .seat-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      margin-bottom: 8px;
    }

    .player-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ffe0a2;
      font-weight: 700;
      font-size: clamp(0.88rem, 1.4vw, 1.02rem);
    }

    .stack {
      color: var(--cream);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .dealer-chip {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      border-radius: 50%;
      border: 1px solid rgba(255, 238, 199, 0.80);
      color: #2a160d;
      background: linear-gradient(180deg, #fff2cf, #cf9b46);
      font-size: 0.78rem;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
    }

    .hole-cards {
      display: flex;
      justify-content: center;
      gap: 6px;
      min-height: var(--card-h);
    }

    .seat-status {
      min-height: 24px;
      margin-top: 7px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .bet-badge {
      color: #ffe0a2;
    }

    .thinking {
      color: #f7d693;
      font-style: italic;
      animation: thinkingPulse 1s ease-in-out infinite alternate;
    }

    .card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      flex: 0 0 auto;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.42), inset 0 0 0 1px rgba(0, 0, 0, 0.09);
      transform-style: preserve-3d;
    }

    .card.face {
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.72), transparent 22%),
        repeating-linear-gradient(110deg, rgba(80, 55, 30, 0.035) 0 1px, transparent 1px 5px),
        linear-gradient(145deg, #fff8e7, #e7d6b8);
      border: 1px solid rgba(88, 56, 32, 0.32);
      color: var(--ink);
    }

    .card.face.flip-new {
      animation: flipIn 360ms cubic-bezier(0.2, 0.85, 0.25, 1.15);
    }

    .card.red {
      color: #9e2020;
    }

    .card.black {
      color: #1b1a18;
    }

    .card-back {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 36%),
        radial-gradient(circle at 50% 50%, rgba(215, 173, 93, 0.22), transparent 30%),
        repeating-linear-gradient(45deg, rgba(226, 185, 103, 0.45) 0 2px, transparent 2px 8px),
        linear-gradient(145deg, #351713, #180c0b);
      border: 1px solid rgba(245, 221, 169, 0.50);
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(245, 219, 160, 0.58);
      border-radius: 5px;
    }

    .card-back::after {
      content: "";
      position: absolute;
      inset: 18px 14px;
      border-top: 1px solid rgba(245, 219, 160, 0.48);
      border-bottom: 1px solid rgba(245, 219, 160, 0.48);
      transform: skewY(-8deg);
    }

    .corner {
      position: absolute;
      display: grid;
      justify-items: center;
      line-height: 0.95;
      font-weight: 700;
      font-size: calc(var(--card-w) * 0.19);
      min-width: calc(var(--card-w) * 0.22);
    }

    .corner .rank {
      font-size: calc(var(--card-w) * 0.22);
    }

    .corner.top {
      top: 6px;
      left: 6px;
    }

    .corner.bottom {
      bottom: 6px;
      right: 6px;
      transform: rotate(180deg);
    }

    .pip {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: calc(var(--card-w) * 0.52);
      opacity: 0.92;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.50);
    }

    .card-placeholder {
      border: 1px dashed rgba(215, 173, 93, 0.18);
      background: rgba(0, 0, 0, 0.12);
      box-shadow: none;
    }

    .flying-card {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
      pointer-events: none;
      will-change: transform, opacity;
    }

    .chip-fly {
      position: fixed;
      z-index: 101;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      pointer-events: none;
      background:
        radial-gradient(circle at 35% 30%, #fff0bd, #d5a24e 40%, #7b3d22 70%);
      border: 1px solid rgba(255, 232, 176, 0.80);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.44);
    }

    .controls {
      align-items: stretch;
      padding: 10px;
      flex-wrap: wrap;
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .raise-box {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: min(100%, 340px);
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(215, 173, 93, 0.20);
      background: rgba(0, 0, 0, 0.16);
    }

    .raise-label {
      min-width: 82px;
      color: var(--gold-soft);
      font-weight: 700;
    }

    .hand-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: end;
    }

    .message-log {
      position: fixed;

    @keyframes hazeDrift {
      from { transform: translate3d(-1%, -1%, 0) rotate(-1deg); }
      to { transform: translate3d(1.5%, 1%, 0) rotate(1deg); }
    }

    @keyframes lightShimmer {
      0%, 100% { opacity: 0.32; transform: translateX(-0.4%); }
      50% { opacity: 0.50; transform: translateX(0.4%); }
    }

    @keyframes lampPulse {
      from { opacity: 0.58; transform: scale(0.98); }
      to { opacity: 0.94; transform: scale(1.03); }
    }

    @keyframes flipIn {
      0% { transform: rotateY(88deg) scale(0.96); filter: brightness(0.72); }
      100% { transform: rotateY(0) scale(1); filter: brightness(1); }
    }

    @keyframes thinkingPulse {
      from { opacity: 0.55; }
      to { opacity: 1; }
    }

    @keyframes winnerGlow {
      from {

    @keyframes bannerIn {
      from { opacity: 0; transform: translate(-50%, -8px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    @keyframes ballShake {
      0%, 100% { transform: translateX(0) rotate(0); }
      20% { transform: translateX(-3px) rotate(-5deg); }
      45% { transform: translateX(3px) rotate(5deg); }
      70% { transform: translateX(-2px) rotate(-3deg); }

<body>
  <section id="titleScreen" class="screen title-screen">
    <div class="title-panel">
      <div class="title-copy">
        <div class="kicker">Private table, after midnight</div>
        <h1>Midnight Hold&rsquo;em</h1>
        <p class="subtitle">A smoky table, a slow song, and one last hand.</p>
      </div>
      <div class="title-settings">
        <div class="field">
          <label for="titleDifficulty">Difficulty</label>
          <select id="titleDifficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
            <option value="brutal">Brutal</option>
          </select>
        </div>
        <div class="field">
          <label for="titleOpponents">Opponents</label>
          <select id="titleOpponents">
            <option value="3">3 players</option>
            <option value="4">4 players</option>
            <option value="5" selected>5 players</option>
          </select>
        </div>
        <label class="toggle">
          <input id="titleMusic" type="checkbox" checked />
          <span>Music</span>
        </label>
        <label class="toggle">
          <input id="titleSfx" type="checkbox" checked />
          <span>SFX</span>
        </label>
        <button id="startGameBtn" class="start-button">Take a Seat</button>
      </div>
    </div>
  </section>

  <section id="gameScreen" class="screen game-screen hidden" aria-live="polite">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">Midnight Hold&rsquo;em</div>
        <div class="brand-sub">Blinds <span id="blindText">20 / 40</span></div>
      </div>
      <div class="status-strip">
        <span>Hand <strong id="handNumber">1</strong></span>
        <span>Dealer <strong id="dealerName">-</strong></span>
        <span>Street <strong id="streetName">Waiting</strong></span>
        <span>To call <strong id="toCallText">0</strong></span>
      </div>
      <div class="settings-row">
        <select id="gameDifficulty" aria-label="Difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
          <option value="brutal">Brutal</option>
        </select>
        <div class="audio-row">
          <label class="toggle">
            <input id="gameMusic" type="checkbox" checked />
            <span>Music</span>
          </label>
          <label class="toggle">
            <input id="gameSfx" type="checkbox" checked />
            <span>SFX</span>
          </label>
        </div>
      </div>
    </header>

    <main class="table-stage">
      <div class="lamp left"></div>
      <div class="lamp right"></div>
      <section id="pokerTable" class="poker-table" aria-label="Poker table">
        <div id="deckZone" class="deck-zone" aria-hidden="true">
          <div class="deck-stack"></div>
        </div>
        <div class="center-felt">
          <div id="communityCards" class="community"></div>
          <div id="potDisplay" class="pot-display">Pot 0</div>
          <div id="roundNote" class="round-note"></div>
        </div>
        <div id="seats" class="seats"></div>
      </section>
      <aside id="messageLog" class="message-log hidden">
        <div id="logLines" class="log-lines"></div>
      </aside>
      <aside id="oddsPanel" class="table-info-panel hidden" aria-live="polite">
        <span class="info-label">Win Probability</span>
        <span id="oddsValue" class="info-main">--</span>
        <span id="oddsDetail" class="info-detail"></span>
      </aside>
      <aside id="handInfoPanel" class="table-info-panel hand-info hidden" aria-live="polite">
        <span class="info-label">Your Hand</span>
        <span id="handInfoValue" class="info-main">--</span>
        <span id="handInfoDetail" class="info-detail"></span>
      </aside>
      <div id="showdownBanner" class="showdown-banner hidden"></div>
    </main>

    <section class="quote-corner">
      <div class="quote-controls">
        <button id="quoteToggleBtn" class="note-toggle" aria-expanded="false" aria-controls="quotePanel">Words of Encouragement</button>
        <button id="quoteNextBtn" class="note-toggle" aria-label="Next words of encouragement">Next</button>
      </div>
      <div id="quotePanel" class="quote-panel hidden">
        <span id="quoteText"></span>
      </div>
    </section>
    <section class="magic-oracle">
      <button id="magicBallBtn" class="magic-ball" aria-label="Ask the magic 8 ball for advice">
        <span>8</span>
      </button>
      <div id="magicAdvicePanel" class="magic-advice hidden" aria-live="polite">
        <span id="magicAdviceText"></span>
      </div>
    </section>
    <div class="watermark">made by Steele Bennett</div>

    <footer class="controls">
      <div class="action-buttons">
        <button id="foldBtn">Fold</button>
        <button id="checkBtn">Check</button>
        <button id="callBtn">Call</button>
        <div class="raise-box">
          <span id="raiseLabel" class="raise-label">Raise 80</span>
          <input id="raiseSlider" type="range" min="80" max="1500" step="10" value="80" />
          <button id="raiseBtn">Raise</button>
        </div>
        <button id="allInBtn">All In</button>
      </div>
      <div class="hand-actions">
        <button id="oddsToggleBtn" class="note-toggle" aria-expanded="false" aria-controls="oddsPanel">Win Odds</button>
        <button id="handInfoToggleBtn" class="note-toggle" aria-expanded="false" aria-controls="handInfoPanel">Your Hand</button>
        <button id="noteToggleBtn" class="note-toggle" aria-expanded="false" aria-controls="messageLog">Dealer Note</button>
        <button id="newHandBtn">New Hand</button>
        <button id="newGameBtn">New Game</button>
      </div>
    </footer>
  </section>

    const SUITS = [
